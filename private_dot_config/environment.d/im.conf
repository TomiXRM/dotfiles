# Input method environment for the user session (read by systemd --user).
# Set here because GNOME/Wayland does not source ~/.xinputrc, leaving stale
# ibus defaults that crash GTK apps (e.g. ghostty segfaults in
# g_utf8_pointer_to_offset during fcitx5 preedit). See dot_xinputrc (im-config).
#
# GTK_IM_MODULE=wayland is the ghostty-recommended value that avoids the
# preedit crash; fcitx5 is reached via the Wayland text-input protocol.
GTK_IM_MODULE=wayland
QT_IM_MODULE=fcitx
XMODIFIERS=@im=fcitx
